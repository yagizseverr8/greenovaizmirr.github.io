<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreeNova İzmir | 9-A Projesi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .admin-only { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="fixed w-full z-50 glass shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-leaf text-green-600 text-2xl"></i>
                <span class="text-2xl font-bold tracking-tighter text-green-800">GREENOVA</span>
            </div>
            <div class="hidden md:flex space-x-8 font-medium">
                <a href="#home" class="hover:text-green-600 transition">Ana Sayfa</a>
                <a href="#gallery" class="hover:text-green-600 transition">Galeri</a>
            </div>
        </div>
    </nav>

    <section id="home" class="h-screen flex items-center justify-center bg-gradient-to-br from-green-900 via-green-800 to-emerald-900 text-white pt-20">
        <div class="text-center px-6">
            <h1 class="text-5xl md:text-7xl font-bold mb-6 italic">GreeNova İzmir</h1>
            <p class="text-xl md:text-2xl mb-8 text-green-100 max-w-2xl mx-auto font-light">Yeşilay ile temiz bir gelecek. 9-A sınıfı sunar.</p>
            <a href="#gallery" class="bg-white text-green-800 px-8 py-4 rounded-full font-bold text-lg hover:bg-green-100 transition shadow-xl inline-block">Galeriyi Keşfet</a>
        </div>
    </section>

    <section id="gallery" class="py-24 px-6 max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6">
            <div>
                <h2 class="text-4xl font-bold text-gray-800 mb-4">Proje Galerisi</h2>
                <div class="h-1.5 w-32 bg-green-600 rounded-full"></div>
            </div>
            
            <div id="adminControls" class="admin-only bg-white p-6 rounded-2xl shadow-2xl border border-green-100 w-full md:w-80">
                <h3 class="font-bold mb-4 text-green-800 flex items-center"><i class="fas fa-user-shield mr-2"></i> Yönetici Paneli</h3>
                <input type="file" id="photoInput" class="mb-4 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700">
                <button onclick="fotoEkle()" id="yukleBtn" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 transition">Yükle</button>
            </div>
        </div>

        <div id="galeriGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </section>

    <script>
        // FIREBASE KONFIGURASYONU (SENİN BİLGİLERİN)
        const firebaseConfig = {
            apiKey: "AIzaSyCyeATDHNqFPdYDnjZwu4WE0s_IXYFbXq0",
            authDomain: "greenovagaleri.firebaseapp.com",
            projectId: "greenovagaleri",
            storageBucket: "greenovagaleri.firebasestorage.app",
            messagingSenderId: "536132833624",
            appId: "1:536132833624:web:6e8742e9b435829fa83e2d",
            measurementId: "G-H64Z8Z418C"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let isAdmin = false;

        // VERİLERİ VERİTABANINDAN ÇEK
        function galeriyiGetir() {
            db.collection("galeri").orderBy("zaman", "desc").onSnapshot((snapshot) => {
                const grid = document.getElementById('galeriGrid');
                grid.innerHTML = '';
                snapshot.forEach((doc) => {
                    const foto = doc.data();
                    grid.innerHTML += `
                        <div class="relative group overflow-hidden rounded-2xl shadow-lg h-80 bg-gray-200">
                            <img src="${foto.url}" class="w-full h-full object-cover transform group-hover:scale-105 transition duration-700">
                            <button onclick="fotoSil('${doc.id}')" class="admin-only absolute top-4 right-4 bg-red-600 text-white font-bold px-3 py-1 rounded-lg hover:bg-red-700 z-20">SİL</button>
                        </div>`;
                });
                adminPaneliniGuncelle();
            });
        }

        // FOTOĞRAF EKLE (KALICI)
        async function fotoEkle() {
            const input = document.getElementById('photoInput');
            const btn = document.getElementById('yukleBtn');
            
            if (input.files && input.files[0]) {
                btn.disabled = true;
                btn.innerText = "Yükleniyor...";
                
                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        await db.collection("galeri").add({
                            url: e.target.result,
                            zaman: Date.now()
                        });
                        input.value = '';
                    } catch (error) {
                        alert("Hata: Firestore kurallarını 'true' yaptığından emin ol!");
                    }
                    btn.disabled = false;
                    btn.innerText = "Yükle";
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // FOTOĞRAF SİL (KALICI)
        function fotoSil(id) {
            if(confirm('Bu resim herkesten silinecek!')) {
                db.collection("galeri").doc(id).delete();
            }
        }

        // GİZLİ GİRİŞ (L TUŞU)
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'l') {
                const sifre = prompt('Şifre:');
                if (sifre === 'greenova9a') {
                    isAdmin = true;
                    adminPaneliniGuncelle();
                }
            }
        });

        function adminPaneliniGuncelle() {
            const controls = document.getElementById('adminControls');
            const deleteButtons = document.querySelectorAll('.admin-only');
            if (isAdmin) {
                if(controls) controls.style.display = 'block';
                deleteButtons.forEach(btn => btn.style.display = 'block');
            }
        }

        window.onload = galeriyiGetir;
    </script>
</body>
</html>
