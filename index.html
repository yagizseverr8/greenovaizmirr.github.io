<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreeNova | Sağlıklı Yaşam Ligi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        .admin-only { display: none; }
        .logged-in .admin-only { display: block; }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-white text-gray-800">

    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-green-100">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black text-green-600 uppercase">GreeNova İzmir</div>
            <div class="space-x-6 font-semibold text-sm">
                <a href="#anasayfa" class="hover:text-green-500">Anasayfa</a>
                <a href="#biz-kimiz" class="hover:text-green-500">Biz Kimiz</a>
                <a href="#galeri" class="hover:text-green-500">Galeri</a>
            </div>
        </div>
    </nav>

    <header id="anasayfa" class="py-20">
        <div class="container mx-auto px-6 text-center lg:text-left flex flex-wrap items-center">
            <div class="w-full lg:w-3/5">
                <h1 class="text-5xl font-extrabold mb-6">Proje Kimliği</h1>
                <div class="bg-green-50 p-6 border-l-8 border-green-600 rounded">
                    <p class="text-xl italic">"Bağımlılıkla mücadele ve sağlıklı yaşam için yenilikçi eğitim modeli."</p>
                </div>
            </div>
        </div>
    </header>

    <section id="galeri" class="py-24 bg-white border-t">
        <div class="container mx-auto px-6 text-center">
            <h2 class="text-4xl font-bold mb-12">Galeri</h2>

            <!-- ADMİN PANELİ -->
            <div id="adminPanel" class="admin-only bg-green-50 p-8 rounded-2xl mb-12 max-w-xl mx-auto border-2 border-dashed border-green-300">
                <input type="file" id="photoInput" accept="image/*" class="mb-4 block w-full text-sm">
                <button onclick="fotoEkle()" id="yukleBtn" class="bg-green-600 text-white px-10 py-3 rounded-xl font-bold w-full uppercase shadow-lg">FOTOĞRAFI YAYINLA</button>
            </div>

            <!-- FOTOĞRAF GRİDİ -->
            <div id="galeriGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <!-- Burası Firebase'den dolacak -->
            </div>
        </div>
    </section>

    <script>
        // --- BURAYI KENDİ BİLGİLERİNLE DOLDUR ---
        const firebaseConfig = {
            apiKey: "SENİN_KEYİN",
            authDomain: "SENİN_PROJEN.firebaseapp.com",
            databaseURL: "https://SENİN_PROJEN-default-rtdb.firebaseio.com",
            projectId: "SENİN_PROJEN",
            storageBucket: "SENİN_PROJEN.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. VERİLERİ ANLIK ÇEK VE GÖSTER
        database.ref('fotograflar').on('value', (snapshot) => {
            const grid = document.getElementById('galeriGrid');
            grid.innerHTML = '';
            const data = snapshot.val();
            
            if (data) {
                // Firebase'in her fotoğrafa verdiği benzersiz KEY'i (id) kullanıyoruz
                Object.keys(data).reverse().forEach(key => {
                    grid.innerHTML += `
                        <div class="relative rounded-2xl shadow-xl h-64 overflow-hidden bg-gray-100">
                            <img src="${data[key].url}" class="w-full h-full object-cover">
                            <button onclick="fotoSil('${key}')" class="admin-only absolute top-2 right-2 bg-red-600 text-white px-3 py-1 rounded shadow-lg hover:bg-red-700 transition">SİL</button>
                        </div>`;
                });
            } else {
                grid.innerHTML = '<p class="text-gray-400 col-span-full italic">Galeri boş.</p>';
            }
        });

        // 2. FOTOĞRAF EKLEME (BUGSUZ VERSİYON)
        function fotoEkle() {
            const input = document.getElementById('photoInput');
            const btn = document.getElementById('yukleBtn');
            
            if (!input.files[0]) {
                alert("Önce bir fotoğraf seç kanka!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "YÜKLENİYOR...";

            const reader = new FileReader();
            reader.onload = function(e) {
                // 'push' kullanarak her fotoğrafa benzersiz bir Firebase anahtarı oluşturuyoruz
                database.ref('fotograflar').push({
                    url: e.target.result,
                    tarih: Date.now()
                }).then(() => {
                    alert("Eklendi!");
                    input.value = '';
                    btn.disabled = false;
                    btn.innerText = "FOTOĞRAFI YAYINLA";
                }).catch(err => {
                    alert("Firebase Hatası! Kuralları (Rules) kontrol ettin mi?");
                    console.error(err);
                    btn.disabled = false;
                    btn.innerText = "FOTOĞRAFI YAYINLA";
                });
            };
            reader.readAsDataURL(input.files[0]);
        }

        // 3. NOKTA ATIŞI SİLME (Hangi anahtara basılırsa sadece o gider)
        function fotoSil(firebaseKey) {
            if(confirm('Sadece bu görsel silinecek, emin misin?')) {
                database.ref('fotograflar/' + firebaseKey).remove();
            }
        }

        // 4. ADMİN GİRİŞİ
        window.onload = () => {
            if (localStorage.getItem('greenova_admin') === 'true') document.body.classList.add('logged-in');
        };

        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'l') {
                if(prompt("Şifre:") === "greenova9a") {
                    localStorage.setItem('greenova_admin', 'true');
                    document.body.classList.add('logged-in');
                }
            }
            if (e.key.toLowerCase() === 'x') {
                localStorage.removeItem('greenova_admin');
                document.body.classList.remove('logged-in');
            }
        });
    </script>
</body>
</html>
